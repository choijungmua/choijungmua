<svg width="960" height="288" viewBox="0 0 960 288" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">CJM — Frontend Engineer</title>
  <desc id="description">A compact dark technical banner with a dimensional interface stack.</desc>

  <defs>
    <linearGradient id="background" x1="58" y1="18" x2="910" y2="278" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11131A" />
      <stop offset="0.52" stop-color="#08090A" />
      <stop offset="1" stop-color="#0E0B1A" />
    </linearGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(730 104) rotate(145) scale(330 190)">
      <stop stop-color="#7170FF" stop-opacity="0.36" />
      <stop offset="1" stop-color="#7170FF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3C3C57" />
      <stop offset="0.5" stop-color="#24243B" />
      <stop offset="1" stop-color="#171725" />
    </linearGradient>
    <linearGradient id="leftFace" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#171827" />
      <stop offset="1" stop-color="#0B0C12" />
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#292541" />
      <stop offset="1" stop-color="#111018" />
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.18" />
      <stop offset="0.45" stop-color="#7170FF" stop-opacity="0.16" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7170FF" />
      <stop offset="1" stop-color="#A7A5FF" />
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#F7F8F8" stroke-opacity="0.035" />
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.55" />
    </filter>
    <clipPath id="frame">
      <rect width="960" height="288" rx="28" />
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="960" height="288" fill="url(#background)" />
    <rect width="960" height="288" fill="url(#grid)" />
    <rect x="470" y="-30" width="540" height="350" fill="url(#violetGlow)" />
    <path d="M0 244C208 211 363 260 540 230C687 205 815 196 960 216V288H0V244Z" fill="#7170FF" fill-opacity="0.04" />

    <g aria-label="Profile introduction">
      <rect x="50" y="36" width="156" height="34" rx="17" fill="#7170FF" fill-opacity="0.13" stroke="#A7A5FF" stroke-opacity="0.24" />
      <rect x="66" y="49" width="8" height="8" rx="2" fill="#8F8DFF" transform="rotate(45 70 53)" />
      <text x="86" y="58" fill="#D0D6E0" font-size="14" font-weight="600" letter-spacing="1.6" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">WEB / PRODUCT</text>

      <text x="48" y="148" fill="#F7F8F8" font-size="88" font-weight="600" letter-spacing="-4" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">CJM</text>
      <rect x="52" y="166" width="64" height="4" rx="2" fill="url(#accent)" />
      <text x="50" y="210" fill="#D0D6E0" font-size="24" font-weight="500" letter-spacing="2.4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">FRONTEND ENGINEER</text>
    </g>

    <g transform="translate(602 34) scale(0.76)" filter="url(#shadow)" aria-label="Dimensional frontend system">
      <path d="M16 130L198 224L378 130L198 36L16 130Z" fill="url(#topFace)" stroke="#FFFFFF" stroke-opacity="0.12" />
      <path d="M16 130L198 224V256L16 162V130Z" fill="url(#leftFace)" stroke="#FFFFFF" stroke-opacity="0.07" />
      <path d="M378 130L198 224V256L378 162V130Z" fill="url(#rightFace)" stroke="#FFFFFF" stroke-opacity="0.09" />
      <path d="M198 224V256" stroke="#7170FF" stroke-opacity="0.7" />

      <path d="M62 104L198 174L332 104L198 34L62 104Z" fill="#14151D" stroke="#7170FF" stroke-opacity="0.52" />
      <path d="M62 104L198 174V194L62 124V104Z" fill="#0A0B10" stroke="#FFFFFF" stroke-opacity="0.06" />
      <path d="M332 104L198 174V194L332 124V104Z" fill="#1A1829" stroke="#FFFFFF" stroke-opacity="0.08" />

      <path d="M104 78L198 126L292 78L198 30L104 78Z" fill="url(#glass)" stroke="#A7A5FF" stroke-opacity="0.58" />
      <path d="M104 78L198 126V139L104 91V78Z" fill="#111219" fill-opacity="0.92" />
      <path d="M292 78L198 126V139L292 91V78Z" fill="#24203B" fill-opacity="0.92" />

      <circle cx="198" cy="76" r="18" fill="#7170FF" fill-opacity="0.22" stroke="#A7A5FF" stroke-opacity="0.7" />
      <path d="M188 76L195 83L209 68" stroke="#DAD9FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M93 116L145 143" stroke="#8A8F98" stroke-width="3" stroke-linecap="round" stroke-opacity="0.55" />
      <path d="M250 143L302 116" stroke="#A7A5FF" stroke-width="3" stroke-linecap="round" stroke-opacity="0.56" />
      <path d="M86 139L146 170" stroke="#62666D" stroke-width="3" stroke-linecap="round" stroke-opacity="0.45" />
      <path d="M249 170L310 139" stroke="#7170FF" stroke-width="3" stroke-linecap="round" stroke-opacity="0.44" />
    </g>
  </g>

  <rect x="0.5" y="0.5" width="959" height="287" rx="27.5" stroke="#FFFFFF" stroke-opacity="0.1" />
</svg>
