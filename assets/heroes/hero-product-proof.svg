<svg width="900" height="400" viewBox="0 0 900 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-product-proof-title hero-product-proof-desc">
  <title id="hero-product-proof-title">Selected work: ClickPick, ALLIM, and Contribution Art</title>
  <desc id="hero-product-proof-desc">An editorial product-proof banner showing ClickPick as a map-based community, ALLIM as a TypeScript frontend under active development, and Contribution Art as Git-history-driven contribution-graph art.</desc>

  <style>
    :root {
      --canvas: #0B0D10;
      --surface: #11151A;
      --surface-muted: #181D24;
      --text: #F6F8FA;
      --text-muted: #A7B0BB;
      --border: #30363D;
      --accent: #58A6FF;
    }

    .sans {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    }

    .display {
      fill: var(--text);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .label {
      fill: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    .body {
      fill: var(--text-muted);
      font-size: 16px;
      font-weight: 400;
    }

    .rule {
      stroke: var(--border);
      stroke-width: 1;
      shape-rendering: crispEdges;
    }
  </style>

  <defs>
    <clipPath id="product-proof-frame">
      <rect width="900" height="400" rx="16" />
    </clipPath>
  </defs>

  <g clip-path="url(#product-proof-frame)">
    <rect width="900" height="400" fill="var(--canvas)" />
    <rect x="24" y="104" width="520" height="272" fill="var(--surface)" />
    <rect x="568" y="248" width="308" height="128" fill="var(--surface-muted)" />

    <g aria-label="Source-supported selected work">
      <rect x="32" y="32" width="24" height="24" rx="8" fill="var(--surface-muted)" stroke="var(--accent)" />
      <path d="M39 44L43 48L50 40" stroke="var(--accent)" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" />
      <text x="72" y="48" class="mono label">PRODUCT PROOF / SELECTED WORK</text>
      <text x="704" y="48" class="mono label">SOURCE-SUPPORTED</text>
      <line x1="32" y1="80" x2="868" y2="80" class="rule" />
    </g>

    <g aria-label="ClickPick, map-based community">
      <text x="48" y="136" class="mono label">MAP-BASED COMMUNITY</text>
      <text x="48" y="192" class="sans display" font-size="48">ClickPick</text>
      <text x="48" y="232" class="sans body">Place discovery and sharing</text>
      <text x="48" y="264" class="sans body">Posts · profiles · admin tools</text>

      <g aria-label="Place discovery route">
        <path d="M376 168H424V208H488V272H432V320H376" class="rule" />
        <rect x="368" y="160" width="16" height="16" rx="4" fill="var(--surface-muted)" stroke="var(--border)" />
        <rect x="416" y="200" width="16" height="16" rx="4" fill="var(--surface-muted)" stroke="var(--border)" />
        <rect x="480" y="264" width="16" height="16" rx="4" fill="var(--surface-muted)" stroke="var(--accent)" />
        <rect x="424" y="312" width="16" height="16" rx="4" fill="var(--surface-muted)" stroke="var(--border)" />
        <circle cx="488" cy="272" r="4" fill="var(--accent)" />
      </g>

      <line x1="48" y1="328" x2="336" y2="328" class="rule" />
      <text x="48" y="352" class="mono label">DISCOVER · SHARE · MANAGE</text>
    </g>

    <line x1="560" y1="104" x2="560" y2="376" class="rule" />

    <g aria-label="ALLIM, TypeScript frontend">
      <text x="584" y="136" class="mono label">TYPESCRIPT FRONTEND</text>
      <text x="584" y="184" class="sans display" font-size="40">ALLIM</text>
      <text x="584" y="216" class="sans body">Application under active development</text>
    </g>

    <line x1="584" y1="232" x2="868" y2="232" class="rule" />

    <g aria-label="Contribution Art, Git history automation">
      <text x="584" y="280" class="mono label">GIT WORKFLOW</text>
      <text x="584" y="320" class="sans display" font-size="32">Contribution Art</text>
      <text x="584" y="352" class="sans body">Shell · GitHub Actions · Git history</text>

      <g aria-label="Contribution graph motif" fill="var(--border)">
        <rect x="800" y="264" width="8" height="8" />
        <rect x="816" y="264" width="8" height="8" />
        <rect x="832" y="264" width="8" height="8" />
        <rect x="848" y="264" width="8" height="8" />
        <rect x="816" y="248" width="8" height="8" />
        <rect x="832" y="248" width="8" height="8" />
        <rect x="848" y="248" width="8" height="8" />
      </g>
    </g>
  </g>

  <rect x="0.5" y="0.5" width="899" height="399" rx="15.5" stroke="var(--border)" />
</svg>
