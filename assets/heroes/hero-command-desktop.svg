<svg width="1200" height="480" viewBox="0 0 1200 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-command-desktop-title hero-command-desktop-desc" preserveAspectRatio="xMidYMid meet">
  <title id="hero-command-desktop-title">CJM, product-minded frontend engineer</title>
  <desc id="hero-command-desktop-desc">A precise command-palette study advances once through Build, Verify, and Ship, then settles on a verified final state.</desc>
  <style>
    :root {
      --color-canvas: #0B0D10;
      --color-surface: #11151A;
      --color-surface-muted: #181D24;
      --color-text: #F6F8FA;
      --color-text-muted: #A7B0BB;
      --color-border: #30363D;
      --color-accent: #58A6FF;
      --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    }
    .canvas { fill: var(--color-canvas); }
    .surface { fill: var(--color-surface); }
    .surface-muted { fill: var(--color-surface-muted); }
    .border { stroke: var(--color-border); stroke-width: 1; }
    .accent-border { stroke: var(--color-accent); stroke-width: 1; }
    .text { fill: var(--color-text); font-family: var(--font-sans); }
    .muted { fill: var(--color-text-muted); font-family: var(--font-sans); }
    .mono { font-family: var(--font-mono); font-weight: 600; letter-spacing: .06em; }
    .accent { fill: var(--color-accent); }
    .display { font-size: 88px; font-weight: 700; letter-spacing: -.03em; }
    .role { font-size: 24px; font-weight: 650; letter-spacing: -.015em; }
    .eyebrow { font-size: 12px; }
    .surface-title { font-size: 24px; font-weight: 650; letter-spacing: -.015em; }
    .row-text { font-size: 16px; font-weight: 500; }
    .row-meta { font-size: 12px; }
    .active-build, .active-verify { opacity: 0; }
    .done-build, .done-verify, .active-ship { opacity: 1; }
    .active-build { animation: build-active 2.4s linear 1 both; }
    .done-build { animation: build-done 2.4s linear 1 both; }
    .active-verify { animation: verify-active 2.4s linear 1 both; }
    .done-verify { animation: verify-done 2.4s linear 1 both; }
    .active-ship { animation: ship-active 2.4s linear 1 both; }
    .sequence-marker {
      transform-box: fill-box;
      transform-origin: center;
      transform: translateY(160px);
      animation: marker-flow 2.4s linear 1 both;
    }
    @keyframes build-active {
      0%, 18% { opacity: 1; transform: translateY(0); }
      27%, 100% { opacity: 0; transform: translateY(2px); }
    }
    @keyframes build-done {
      0%, 25% { opacity: 0; transform: translateY(2px); }
      34%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes verify-active {
      0%, 27% { opacity: 0; transform: translateY(4px); }
      36%, 56% { opacity: 1; transform: translateY(0); }
      65%, 100% { opacity: 0; transform: translateY(2px); }
    }
    @keyframes verify-done {
      0%, 63% { opacity: 0; transform: translateY(2px); }
      72%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes ship-active {
      0%, 65% { opacity: 0; transform: translateY(4px); }
      74%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes marker-flow {
      0%, 18% { transform: translateY(0); }
      27%, 56% { transform: translateY(80px); }
      65%, 100% { transform: translateY(160px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .active-build, .done-build, .active-verify, .done-verify, .active-ship, .sequence-marker { animation: none; }
      .active-build, .active-verify { opacity: 0; transform: none; }
      .done-build, .done-verify, .active-ship { opacity: 1; transform: none; }
      .sequence-marker { transform: translateY(160px); }
    }
  </style>
  <defs>
    <clipPath id="hero-command-desktop-frame">
      <rect width="1200" height="480" rx="16" />
    </clipPath>
  </defs>

  <g clip-path="url(#hero-command-desktop-frame)">
    <rect class="canvas" width="1200" height="480" />
    <path class="border" d="M40 40H1160M40 440H1160M488 40V440" />
    <path class="border" d="M64 64H112M64 416H112" />

    <g aria-label="Identity">
      <text class="muted mono eyebrow" x="64" y="88">CJM / PROFILE</text>
      <text class="text display" x="60" y="190">CJM</text>
      <rect class="accent" x="64" y="216" width="64" height="8" rx="4" />
      <text class="text role" x="64" y="276">PRODUCT-MINDED</text>
      <text class="text role" x="64" y="312">FRONTEND ENGINEER</text>
      <text class="muted mono eyebrow" x="64" y="392">BUILD / VERIFY / SHIP</text>
    </g>

    <g aria-label="Finite workflow sequence">
      <rect class="surface border" x="520.5" y="48.5" width="623" height="383" rx="16" />
      <text class="muted mono eyebrow" x="552" y="84">WORKFLOW / FINITE STATE SEQUENCE</text>
      <text class="text surface-title" x="552" y="122">Build → Verify → Ship</text>
      <path class="border" d="M552 144H1112" />

      <g aria-label="Build state">
        <rect class="surface border" x="552.5" y="168.5" width="559" height="63" rx="8" />
        <text class="muted mono row-meta" x="576" y="207">01</text>
        <text class="text mono row-text" x="624" y="208">BUILD INTERFACE</text>
        <text class="muted mono row-meta" x="1020" y="207">PENDING</text>
        <g class="active-build">
          <rect class="surface-muted accent-border" x="552.5" y="168.5" width="559" height="63" rx="8" />
          <text class="accent mono row-meta" x="576" y="207">01</text>
          <text class="text mono row-text" x="624" y="208">BUILD INTERFACE</text>
          <text class="accent mono row-meta" x="1032" y="207">ACTIVE</text>
        </g>
        <g class="done-build">
          <rect class="surface" x="996" y="176" width="104" height="48" />
          <path class="accent-border" d="M1012 201L1018 207L1028 195" />
          <text class="accent mono row-meta" x="1040" y="207">DONE</text>
        </g>
      </g>

      <g aria-label="Verify state">
        <rect class="surface border" x="552.5" y="248.5" width="559" height="63" rx="8" />
        <text class="muted mono row-meta" x="576" y="287">02</text>
        <text class="text mono row-text" x="624" y="288">VERIFY BEHAVIOR</text>
        <text class="muted mono row-meta" x="1020" y="287">PENDING</text>
        <g class="active-verify">
          <rect class="surface-muted accent-border" x="552.5" y="248.5" width="559" height="63" rx="8" />
          <text class="accent mono row-meta" x="576" y="287">02</text>
          <text class="text mono row-text" x="624" y="288">VERIFY BEHAVIOR</text>
          <text class="accent mono row-meta" x="1032" y="287">ACTIVE</text>
        </g>
        <g class="done-verify">
          <rect class="surface" x="996" y="256" width="104" height="48" />
          <path class="accent-border" d="M1012 281L1018 287L1028 275" />
          <text class="accent mono row-meta" x="1040" y="287">DONE</text>
        </g>
      </g>

      <g aria-label="Ship state">
        <rect class="surface border" x="552.5" y="328.5" width="559" height="63" rx="8" />
        <text class="muted mono row-meta" x="576" y="367">03</text>
        <text class="text mono row-text" x="624" y="368">SHIP EVIDENCE</text>
        <text class="muted mono row-meta" x="1020" y="367">PENDING</text>
        <g class="active-ship">
          <rect class="surface-muted accent-border" x="552.5" y="328.5" width="559" height="63" rx="8" />
          <text class="accent mono row-meta" x="576" y="367">03</text>
          <text class="text mono row-text" x="624" y="368">SHIP EVIDENCE</text>
          <path class="accent-border" d="M1006 361L1012 367L1022 355" />
          <text class="accent mono row-meta" x="1034" y="367">VERIFIED</text>
        </g>
      </g>

      <rect class="accent sequence-marker" x="536" y="184" width="4" height="32" rx="2" />
      <text class="muted mono eyebrow" x="552" y="416">SETTLES AFTER ONE PASS</text>
    </g>
  </g>
  <rect class="border" x="0.5" y="0.5" width="1199" height="479" rx="15.5" />
</svg>
