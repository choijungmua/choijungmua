    <text class="sans" x="48" y="238" fill="#A7B0BB" font-size="19" font-weight="400">Interface, state, and delivery</text>
    <text class="sans" x="48" y="266" fill="#A7B0BB" font-size="19" font-weight="400">arranged as one readable field.</text>
    <path d="M48 310H240" stroke="#30363D" />
