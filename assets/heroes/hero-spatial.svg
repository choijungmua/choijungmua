<svg width="900" height="420" viewBox="0 0 900 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="spatial-title spatial-description">
  <title id="spatial-title">CJM spatial systems — isometric study</title>
  <desc id="spatial-description">A pre-rendered isometric study with three raised system planes for interface, state, and delivery, linked across a precise neutral grid.</desc>

  <style>
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
  </style>

  <rect width="900" height="420" rx="16" fill="#0B0D10" />

  <g aria-label="CJM spatial systems introduction">
